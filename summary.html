<!DOCTYPE html>
<html>
<head>
<title>Summary</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">

<h2>Order Summary</h2>

<div id="list"></div>

<h3 id="total"></h3>

<button onclick="go()">Proceed</button>

</div>

<script>
const cart=JSON.parse(localStorage.getItem("cart"));
const bundle=localStorage.getItem("bundle")==="true";
const ship=parseInt(localStorage.getItem("ship"))||0;

const prices=[360,84,36,36,24,24,36,24,14,6,12,12,12,8,20,12,12,12,12,12,12,20];

let total=0;
let text="";

cart.forEach(i=>{
  total+=prices[i];
  text+=`Item ${i+1} - ₹${prices[i]}\n`;
});

if(bundle) total-=100;

let final=total+ship;

list.innerText=text;

totalEl=document.getElementById("total");
totalEl.innerHTML=
`Books: ₹${total}<br>Shipping: ₹${ship}<br><b>Total: ₹${final}</b>`;

function go(){
  const url=`YOUR_FORM_LINK&entry.books=${encodeURIComponent(text)}&entry.total=${final}`;
  window.location=url;
}
</script>

</body>
</html>
